
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="glass-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="glass-glare" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)" />
      <stop offset="35%" stop-color="rgba(255,255,255,0.2)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>

    <linearGradient id="dark-refraction" x1="80%" y1="100%" x2="20%" y2="0%">
      <stop offset="0%" stop-color="#000a1e" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#ffffff; #000a1e; #ffffff" dur="4s" repeatCount="indefinite" />
        <animate attributeName="stop-opacity" values="0.95; 0.85; 0.95" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#000a1e" stop-opacity="0.15">
        <animate attributeName="stop-color" values="#ffffff; #000a1e; #ffffff" dur="4s" repeatCount="indefinite" />
        <animate attributeName="stop-opacity" values="0.6; 0.15; 0.6" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#000a1e" stop-opacity="0" />
    </linearGradient>

    <path id="sparkle" d="M 0,-4 Q 0,0 4,0 Q 0,0 0,4 Q 0,0 -4,0 Q 0,0 0,-4 Z" fill="#FFFFFF" filter="url(#glow)" />

    <path id="arc" d="M 85 50 A 35 35 0 0 0 50 15" fill="none" stroke="#002366" stroke-width="10" stroke-linecap="round" filter="url(#glass-shadow)" />
  </defs>

  <use href="#arc" transform="rotate(5 50 50)" />
  <use href="#arc" transform="rotate(95 50 50)" />
  <use href="#arc" transform="rotate(185 50 50)" />
  <use href="#arc" transform="rotate(275 50 50)" />

  <circle cx="50" cy="50" r="28" fill="rgba(255, 98, 0, 0.65)" filter="url(#glass-shadow)" />
  <circle cx="50" cy="50" r="28" fill="url(#glass-glare)" />
  <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(255, 255, 255, 0.7)" stroke-width="1.5" />

  <g style="transform-origin: 50px 50px;">
    <animateTransform attributeName="transform" type="scale" values="1; 1.15; 1; 1.08; 1" keyTimes="0; 0.1; 0.3; 0.45; 1" dur="2s" repeatCount="indefinite" />
    
    <path d="M50 25 L54 46 L75 50 L54 54 L50 75 L46 54 L25 50 L46 46 Z" fill="url(#dark-refraction)" filter="url(#glass-shadow)" />
    
    <path d="M50 25 L54 46 L75 50 L54 54 L50 75 L46 54 L25 50 L46 46 Z" fill="rgba(255, 255, 255, 0.35)" />
    
    <path d="M50 25 L54 46 L75 50 L54 54 L50 75 L46 54 L25 50 L46 46 Z" fill="url(#glass-glare)">
      <animate attributeName="opacity" values="0.2; 1; 0.2; 0.9; 0.2" keyTimes="0; 0.1; 0.3; 0.45; 1" dur="2s" repeatCount="indefinite" />
    </path>
    
    <path d="M50 25 L54 46 L75 50 L54 54 L50 75 L46 54 L25 50 L46 46 Z" fill="none" stroke="rgba(255, 255, 255, 1)" stroke-width="1.5" />
  </g>
  
  <use href="#sparkle" transform="translate(32, 28) scale(0.9)">
    <animate attributeName="opacity" values="0; 1; 0" dur="1.7s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(24, 40) scale(0.5)">
    <animate attributeName="opacity" values="0; 0.8; 0" dur="2.3s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(38, 38) scale(0.7)">
    <animate attributeName="opacity" values="0; 1; 0" dur="1.1s" repeatCount="indefinite" />
  </use>

  <use href="#sparkle" transform="translate(70, 32) scale(1.1)">
    <animate attributeName="opacity" values="0; 1; 0" dur="2.9s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(60, 24) scale(0.6)">
    <animate attributeName="opacity" values="0; 0.9; 0" dur="1.3s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(76, 44) scale(0.8)">
    <animate attributeName="opacity" values="0; 1; 0" dur="3.1s" repeatCount="indefinite" />
  </use>

  <use href="#sparkle" transform="translate(28, 68) scale(1)">
    <animate attributeName="opacity" values="0; 1; 0" dur="1.9s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(38, 58) scale(0.6)">
    <animate attributeName="opacity" values="0; 0.8; 0" dur="2.7s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(20, 56) scale(0.7)">
    <animate attributeName="opacity" values="0; 1; 0" dur="3.7s" repeatCount="indefinite" />
  </use>

  <use href="#sparkle" transform="translate(68, 68) scale(0.8)">
    <animate attributeName="opacity" values="0; 1; 0" dur="1.5s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(58, 76) scale(0.9)">
    <animate attributeName="opacity" values="0; 1; 0" dur="2.5s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(78, 60) scale(0.5)">
    <animate attributeName="opacity" values="0; 0.7; 0" dur="1.4s" repeatCount="indefinite" />
  </use>
  
  <use href="#sparkle" transform="translate(50, 18) scale(0.4)">
    <animate attributeName="opacity" values="0; 1; 0" dur="0.9s" repeatCount="indefinite" />
  </use>
  <use href="#sparkle" transform="translate(50, 82) scale(0.4)">
    <animate attributeName="opacity" values="0; 1; 0" dur="1.2s" repeatCount="indefinite" />
  </use>
</svg>
