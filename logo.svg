<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
    <defs>
        <linearGradient id="moatGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f5d4"/><stop offset="100%" stop-color="#006a5b"/>
        </linearGradient>
        <linearGradient id="moatDepth" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#003d34"/><stop offset="100%" stop-color="#001a15"/>
        </linearGradient>
        <linearGradient id="castleGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FEE140"/><stop offset="50%" stop-color="#FF9A44"/><stop offset="100%" stop-color="#D95319"/>
        </linearGradient>
        <linearGradient id="plasma" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FA709A"/><stop offset="60%" stop-color="#FF9A44"/><stop offset="100%" stop-color="#FEE140"/>
        </linearGradient>
        
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="6" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/></filter>
        <filter id="heavyShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="8" dy="12" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/></filter>
        <filter id="glowEffect" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <path d="M 70,70 L 200,70 C 340,70 360,160 360,210 C 360,260 340,350 200,350 L 70,350 Z" fill="url(#moatDepth)" filter="url(#shadow)"/>
    <path d="M 60,60 L 190,60 C 330,60 350,150 350,200 C 350,250 330,340 190,340 L 60,340 Z M 130,120 L 190,120 C 270,120 280,160 280,200 C 280,240 270,280 190,280 L 130,280 Z" fill="url(#moatGlow)" fill-rule="evenodd" filter="url(#shadow)"/>
    <path d="M 130,120 L 190,120 C 270,120 280,160 280,200 C 280,240 270,280 190,280 L 130,280 Z" fill="#06090e"/>

    <path d="M 30,290 C 180,290 280,150 380,50" fill="none" stroke="url(#plasma)" stroke-width="90" stroke-linecap="round" filter="url(#glowEffect)" opacity="0.6"/>
    <path d="M 30,290 C 180,290 280,150 380,50" fill="none" stroke="url(#plasma)" stroke-width="45" stroke-linecap="round" filter="url(#shadow)"/>
    <path d="M 30,290 C 180,290 280,150 380,50" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

    <path d="M 145,250 L 145,150 L 175,150 L 195,190 L 220,150 L 250,150 L 250,250 L 225,250 L 225,190 L 195,230 L 165,190 L 165,250 Z" fill="#000000" filter="url(#heavyShadow)" transform="translate(4, 6)"/>
    <path d="M 145,250 L 145,150 L 175,150 L 195,190 L 220,150 L 250,150 L 250,250 L 225,250 L 225,190 L 195,230 L 165,190 L 165,250 Z" fill="url(#castleGold)" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.6" stroke-linejoin="miter"/>
</svg>
