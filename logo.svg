<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 20 220 200">
  <!-- 
    The Consensus 'C' 
    A crisp, institutional silver orbit establishing the foundation.
  -->
  <path d="M 150, 40 A 85,85 0 1,0 150, 210" 
        fill="none" stroke="#9ca3af" stroke-width="12" stroke-linecap="round"/>

  <!-- 
    The Alpha 'A' Core 
    A rigid, warm Amber structure representing fundamental intrinsic value.
  -->
  <path d="M 128, 30 L 50, 216 M 128, 30 L 206, 216" 
        fill="none" stroke="#F59E0B" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 
    The Alpha Trajectory Arrow 
    Neon Teal breaking through the 'A', acting as the crossbar and the growth vector.
  -->
  <path d="M 30, 160 C 80, 180 140, 150 180, 90 C 200, 60 215, 45 230, 30" 
        fill="none" stroke="#00f5d4" stroke-width="16" stroke-linecap="round"/>
        
  <!-- Arrow Head -->
  <path d="M 190, 30 L 230, 30 L 230, 70" 
        fill="none" stroke="#00f5d4" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
