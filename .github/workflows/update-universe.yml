name: Daily Universe Update

on:
  schedule:
    # Runs at 00:30 UTC, which translates exactly to 6:00 AM IST
    - cron: '30 0 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests

      - name: Run universe updater
        run: python universe_updater.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add universe_scored.csv universe_tickers.csv
          git diff --cached --quiet || git commit -m "Auto-update: universe scored $(date +%Y-%m-%d)"
          git push
