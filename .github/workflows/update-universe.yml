name: Daily Universe Update

on:
  schedule:
    # Runs at 00:30 UTC, which translates exactly to 6:00 AM IST
    - cron: '30 0 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-universe:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests supabase

      - name: Run universe updater
        run: python universe_updater.py

      - name: Run Daily Portfolio Tracker
        run: python portfolio_tracker.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific CSVs
          git add universe_scored.csv universe_tickers.csv
          
          # Only proceed if there are actually changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: universe scored $(date +%Y-%m-%d)"
            
            # Fetch the latest remote changes and rebase our new commit on top of them
            # This prevents the 'fetch first' rejection and keeps the commit history linear
            git pull --rebase origin main
            
            git push
          else
            echo "No changes detected in universe data. Skipping commit and push."
          fi
