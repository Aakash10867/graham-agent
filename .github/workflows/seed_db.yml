name: Run Seed Portfolios Script

# The workflow_dispatch event allows you to run this manually from the Actions tab
on:
  workflow_dispatch:

jobs:
  seed-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance supabase pandas

      - name: Execute Seed Script
        env:
          # This pulls the secrets you set in Step 1 securely into the script
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python seed_portfolios.py
