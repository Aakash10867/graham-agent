name: Weekly Mentor Email

on:
  schedule:
    - cron: '30 3 * * 1'  # Monday 3:30 UTC = 9:00 AM IST
  workflow_dispatch:  # manual trigger for testing

jobs:
  send-weekly-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase yfinance pandas google-genai

      - name: Run Weekly Mentor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: python weekly_mentor.py
